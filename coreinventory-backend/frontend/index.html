<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShelfControl</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #0f1623; }
    .splash { text-align: center; color: white; }
    .logo { width: 56px; height: 56px; background: #0d9488; border-radius: 14px; display: grid; place-items: center; margin: 0 auto 16px; }
    .brand { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; letter-spacing: -.02em; margin-bottom: 8px; }
    .sub { font-size: .9rem; color: rgba(255,255,255,.4); margin-bottom: 32px; }
    .spinner { width: 24px; height: 24px; border: 2px solid rgba(13,148,136,.3); border-top-color: #0d9488; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap');
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="2" width="9" height="9" rx="1.5" fill="white"/>
        <rect x="13" y="2" width="9" height="9" rx="1.5" fill="white" opacity=".5"/>
        <rect x="2" y="13" width="9" height="9" rx="1.5" fill="white" opacity=".5"/>
        <rect x="13" y="13" width="9" height="9" rx="1.5" fill="white"/>
      </svg>
    </div>
    <div class="brand">ShelfControl</div>
    <div class="sub">Loading your workspace…</div>
    <div class="spinner"></div>
  </div>
  <script>
    // Redirect: if user session exists go to dashboard, else login
    setTimeout(() => {
      const user = localStorage.getItem('ci_user');
      window.location.href = user ? 'dashboard/dashboard.html' : 'login/login.html';
    }, 1200);
  </script>
</body>
</html>
