<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Profile — ShelfControl</title>
  <link rel="stylesheet" href="../shared/layout.css"/>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-wrap">
    <header class="topbar" id="topbar"></header>
    <main class="page-body">

      <div class="page-hdr">
        <h1 class="page-title">My Profile</h1>
      </div>

      <div style="display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start;">

        <!-- Profile Card -->
        <div class="panel">
          <div style="padding:28px;text-align:center;border-bottom:1px solid var(--border);">
            <div id="profileAvatar" style="width:72px;height:72px;border-radius:16px;background:var(--teal);display:grid;place-items:center;font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:white;margin:0 auto 14px;"></div>
            <div id="profileName" style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--text);letter-spacing:-.01em;"></div>
            <div id="profileRole" style="font-size:.78rem;color:var(--text-2);margin-top:3px;"></div>
            <div id="profileEmail" style="font-size:.72rem;color:var(--text-3);margin-top:4px;font-family:'DM Mono',monospace;"></div>
          </div>
          <div style="padding:16px;">
            <div style="display:flex;flex-direction:column;gap:8px;">
              <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface-2);border-radius:var(--r-sm);font-size:.8rem;">
                <span style="color:var(--text-2);">Member since</span>
                <span style="font-family:'DM Mono',monospace;font-size:.72rem;color:var(--text);">July 2025</span>
              </div>
              <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface-2);border-radius:var(--r-sm);font-size:.8rem;">
                <span style="color:var(--text-2);">Last login</span>
                <span style="font-family:'DM Mono',monospace;font-size:.72rem;color:var(--text);">Today</span>
              </div>
            </div>
            <button class="btn btn-danger" style="width:100%;margin-top:12px;justify-content:center;" onclick="handleLogout(event)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Logout
            </button>
          </div>
        </div>

        <!-- Edit Profile -->
        <div class="panel">
          <div class="panel-hdr">
            <span class="panel-title">Edit Profile</span>
          </div>
          <div class="panel-body">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="editName"/>
              </div>
              <div class="form-group">
                <label class="form-label">Role</label>
                <select class="form-control form-select" id="editRole">
                  <option value="Inv. Manager">Inventory Manager</option>
                  <option value="Warehouse Staff">Warehouse Staff</option>
                  <option value="Admin">Admin</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Email Address</label>
              <input type="email" class="form-control" id="editEmail"/>
            </div>
            <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:4px;">
              <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
            </div>
          </div>

          <div class="divider"></div>

          <div class="panel-hdr" style="border-bottom:none;">
            <span class="panel-title">Change Password</span>
          </div>
          <div class="panel-body" style="padding-top:0;">
            <div class="form-group">
              <label class="form-label">Current Password</label>
              <input type="password" class="form-control" id="curPwd" placeholder="Enter current password"/>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" class="form-control" id="newPwd" placeholder="Min 8 characters"/>
              </div>
              <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" id="confPwd" placeholder="Repeat new password"/>
              </div>
            </div>
            <div style="display:flex;justify-content:flex-end;gap:8px;">
              <button class="btn btn-secondary" onclick="changePassword()">Update Password</button>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<script src="../shared/utils.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  injectSidebar('profile');
  injectTopbar('My Profile');
  loadProfile();
});

function loadProfile() {
  const user = getUser();
  document.getElementById('profileAvatar').textContent = user.initials || 'U';
  document.getElementById('profileName').textContent   = user.name;
  document.getElementById('profileRole').textContent   = user.role;
  document.getElementById('profileEmail').textContent  = user.email;
  document.getElementById('editName').value  = user.name;
  document.getElementById('editEmail').value = user.email;
  const roleEl = document.getElementById('editRole');
  if (roleEl) {
    [...roleEl.options].forEach(o => { if (o.value === user.role) o.selected = true; });
  }
}

function saveProfile() {
  const name  = document.getElementById('editName')?.value.trim();
  const email = document.getElementById('editEmail')?.value.trim();
  const role  = document.getElementById('editRole')?.value;
  if (!name || !email) { showToast('Name and email are required', 'error'); return; }
  const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
  localStorage.setItem('ci_user', JSON.stringify({ name, email, role, initials }));
  loadProfile();
  showToast('Profile updated successfully', 'success');
}

function changePassword() {
  const cur  = document.getElementById('curPwd')?.value;
  const newp = document.getElementById('newPwd')?.value;
  const conf = document.getElementById('confPwd')?.value;
  if (!cur || !newp || !conf) { showToast('Please fill all password fields', 'error'); return; }
  if (newp.length < 8) { showToast('New password must be at least 8 characters', 'error'); return; }
  if (newp !== conf) { showToast('Passwords do not match', 'error'); return; }
  document.getElementById('curPwd').value = '';
  document.getElementById('newPwd').value = '';
  document.getElementById('confPwd').value = '';
  showToast('Password updated successfully', 'success');
}
</script>
</body>
</html>
